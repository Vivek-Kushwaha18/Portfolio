<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivek Kushwaha — Aspiring Data Analyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#081E30;
      --bg-deep:#051420;
      --surface:#0E2C45;
      --surface-2:#123350;
      --ink:#EAF3FA;
      --ink-soft:#A9C6DC;
      --ink-faint:#6C8CA6;
      --line:rgba(157,201,224,0.16);
      --teal:#33B9C7;
      --teal-deep:#1F8FA0;
      --amber:#D4A94B;
      --amber-deep:#B98A2E;
      --teal-tint:rgba(51,185,199,0.14);
      --amber-tint:rgba(212,169,75,0.14);
      --foam:#BFEFF5;
      --radius:3px;
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}

    /* ---------- preloader ---------- */
    .preloader{
      position:fixed; inset:0; z-index:300;
      background:var(--bg-deep);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      transition:opacity 0.7s ease, visibility 0.7s ease;
    }
    .preloader.done{opacity:0; visibility:hidden; pointer-events:none;}
    .vessel{
      width:58px; height:88px;
      border:2px solid rgba(191,239,245,0.32);
      border-radius:4px 4px 18px 18px;
      position:relative; overflow:hidden;
      background:rgba(191,239,245,0.03);
    }
    .vessel .vfill{
      position:absolute; left:0; right:0; bottom:0; height:0%;
      background:linear-gradient(180deg, var(--teal), var(--teal-deep));
      transition:height 0.2s ease-out;
    }
    .vessel .vfill::before{
      content:""; position:absolute; top:-5px; left:-10%; right:-10%; height:10px;
      background:radial-gradient(ellipse at 50% 50%, rgba(191,239,245,0.9), transparent 72%);
      animation:surface-wobble 1.5s ease-in-out infinite;
    }
    @keyframes surface-wobble{
      0%,100%{transform:translateX(-5px) scaleY(1);}
      50%{transform:translateX(5px) scaleY(1.35);}
    }
    .preloader-pct{font-family:'IBM Plex Mono', monospace; color:var(--foam); font-size:13px; letter-spacing:0.06em;}
    .preloader-label{font-family:'IBM Plex Mono', monospace; color:var(--ink-faint); font-size:10.5px; text-transform:lowercase; letter-spacing:0.08em;}

    /* ---------- custom water cursor (fine pointers only) ---------- */
    body.has-cursor{cursor:none;}
    body.has-cursor a, body.has-cursor button{cursor:none;}
    .cursor-dot, .cursor-ring{
      position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
      border-radius:50%; transform:translate(-50%,-50%);
    }
    .cursor-dot{width:5px; height:5px; background:var(--teal);}
    .cursor-ring{
      width:30px; height:30px; border:1px solid rgba(51,185,199,0.5);
      transition:width 0.25s ease, height 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }
    .cursor-ring.magnetic{
      width:50px; height:50px;
      background:rgba(212,169,75,0.08);
      border-color:var(--amber);
    }
    @media (pointer:coarse){
      .cursor-dot, .cursor-ring{display:none !important;}
      body.has-cursor{cursor:auto;}
    }
    body{
      margin:0;
      background:
        radial-gradient(ellipse 900px 500px at 15% 0%, rgba(51,185,199,0.10), transparent 60%),
        radial-gradient(ellipse 700px 500px at 90% 30%, rgba(212,169,75,0.06), transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      color:var(--ink);
      font-family:'Inter', sans-serif;
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      position:relative;
    }

    /* ---------- ambient water layer: caustics + rising bubbles ---------- */
    .water-field{
      position:fixed; inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }
    .caustic{
      position:absolute; inset:-10%;
      background-image:
        repeating-radial-gradient(circle at 20% 30%, rgba(191,239,245,0.05) 0, rgba(191,239,245,0.05) 2px, transparent 3px, transparent 60px),
        repeating-radial-gradient(circle at 70% 70%, rgba(51,185,199,0.06) 0, rgba(51,185,199,0.06) 2px, transparent 3px, transparent 80px);
      animation:caustic-drift 26s ease-in-out infinite alternate;
      opacity:0.6;
    }
    @keyframes caustic-drift{
      0%{transform:translate(0,0) scale(1);}
      100%{transform:translate(-3%,2%) scale(1.06);}
    }
    .bubble{
      position:absolute;
      bottom:-40px;
      border-radius:50%;
      background:radial-gradient(circle at 32% 28%, rgba(255,255,255,0.55), rgba(191,239,245,0.06) 70%);
      border:1px solid rgba(191,239,245,0.18);
      animation-name:bubble-rise;
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }
    @keyframes bubble-rise{
      0%{transform:translateY(0) translateX(0); opacity:0;}
      8%{opacity:0.55;}
      92%{opacity:0.4;}
      100%{transform:translateY(-112vh) translateX(var(--drift,18px)); opacity:0;}
    }
    @media (prefers-reduced-motion: reduce){
      .water-field{display:none;}
    }
    h1,h2,h3{
      font-family:'Space Grotesk', sans-serif;
      margin:0;
      color:var(--ink);
      letter-spacing:-0.01em;
    }
    .mono{font-family:'IBM Plex Mono', monospace;}
    a{color:inherit;}

    ::selection{background:var(--teal); color:#fff;}

    /* ---------- scroll progress bar (tide gauge) ---------- */
    .scroll-progress{
      position:fixed; top:0; left:0; height:3px; width:0%;
      background:linear-gradient(90deg, var(--teal-deep), var(--teal), var(--amber));
      box-shadow:0 0 8px rgba(51,185,199,0.6);
      z-index:100;
      transition:width 0.08s linear;
    }

    /* ---------- ripple click effect ---------- */
    .ripple-el{position:relative; overflow:hidden;}
    .ripple{
      position:absolute;
      border-radius:50%;
      background:radial-gradient(circle, rgba(191,239,245,0.55) 0%, rgba(191,239,245,0.15) 60%, transparent 72%);
      transform:scale(0);
      animation:ripple-out 0.7s cubic-bezier(.25,.6,.4,1) forwards;
      pointer-events:none;
    }
    @keyframes ripple-out{
      to{transform:scale(1); opacity:0;}
    }

    /* ---------- layout helpers ---------- */
    .wrap{max-width:920px; margin:0 auto; padding:0 28px; position:relative; z-index:1;}
    nav, header, section, footer{position:relative; z-index:1;}
    section{padding:96px 0;}

    /* ---------- wave divider (signature element) ---------- */
    .wave-divider{
      display:block;
      width:100%;
      height:64px;
      margin-top:-1px;
    }
    .wave-divider path{
      animation:wave-shift 9s ease-in-out infinite alternate;
    }
    .wave-divider path.w2{ animation-duration:12s; animation-delay:-3s; }
    .wave-divider path.w3{ animation-duration:15s; animation-delay:-6s; }
    @keyframes wave-shift{
      0%{ transform:translateX(0) translateY(0); }
      100%{ transform:translateX(-26px) translateY(3px); }
    }
    .comment{
      font-family:'IBM Plex Mono', monospace;
      font-size:13px;
      color:var(--teal-deep);
      text-transform:lowercase;
      letter-spacing:0.02em;
      margin-bottom:14px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .comment::before{content:"--"; color:var(--ink-faint);}
    .section-title{
      font-size:clamp(26px,4vw,36px);
      font-weight:600;
      margin-bottom:36px;
    }

    /* ---------- reveal on scroll (staggered) ---------- */
    .reveal{
      opacity:0;
      transform:translateY(26px);
      transition:opacity 0.7s cubic-bezier(.21,.9,.32,1), transform 0.7s cubic-bezier(.21,.9,.32,1);
      transition-delay:var(--d, 0ms);
    }
    .reveal.in-view{opacity:1; transform:translateY(0);}

    .reveal.slide-left{transform:translateX(-56px);}
    .reveal.slide-right{transform:translateX(56px);}
    .reveal.slide-left.in-view,
    .reveal.slide-right.in-view{transform:translateX(0);}

    @media (max-width:640px){
      .reveal.slide-left, .reveal.slide-right{transform:translateY(26px);}
      .reveal.slide-left.in-view, .reveal.slide-right.in-view{transform:translateY(0);}
    }

    @media (prefers-reduced-motion: reduce){
      .reveal{opacity:1; transform:none; transition:none;}
      *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
    }

    /* ---------- section title wipe-reveal ---------- */
    .title-wipe{
      position:relative;
      display:inline-block;
      overflow:hidden;
      padding:0 3px;
    }
    .wipe-text{
      display:inline-block;
      opacity:0;
      transition:opacity 0.01s linear 0.42s;
    }
    .title-wipe.in-view .wipe-text{opacity:1;}
    .title-wipe::after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(100deg, var(--teal-deep), var(--teal));
      transform:scaleX(0);
      transform-origin:left;
    }
    .title-wipe.in-view::after{
      animation:wipe-sweep 0.85s cubic-bezier(.65,0,.35,1) forwards;
    }
    @keyframes wipe-sweep{
      0%{transform:scaleX(0); transform-origin:left;}
      48%{transform:scaleX(1); transform-origin:left;}
      52%{transform:scaleX(1); transform-origin:right;}
      100%{transform:scaleX(0); transform-origin:right;}
    }

    /* ---------- side scroll-spy dots ---------- */
    .side-dots{
      position:fixed; right:26px; top:50%;
      transform:translateY(-50%);
      display:flex; flex-direction:column; gap:16px;
      z-index:40;
    }
    .side-dots a{
      position:relative;
      width:8px; height:8px; border-radius:50%;
      background:var(--ink-faint);
      opacity:0.45;
      transition:opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
    }
    .side-dots a::after{
      content:attr(data-label);
      position:absolute; right:18px; top:50%;
      transform:translateY(-50%) translateX(6px);
      font-family:'IBM Plex Mono', monospace;
      font-size:11px;
      white-space:nowrap;
      color:var(--ink-soft);
      background:var(--surface);
      border:1px solid var(--line);
      padding:3px 9px;
      border-radius:4px;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.25s ease, transform 0.25s ease;
    }
    .side-dots a:hover::after{opacity:1; transform:translateY(-50%) translateX(0);}
    .side-dots a:hover{transform:scale(1.3); opacity:1;}
    .side-dots a.active{
      background:var(--teal-deep);
      opacity:1;
      transform:scale(1.5);
    }
    @media (max-width:900px){ .side-dots{display:none;} }

    /* ---------- nav ---------- */
    nav{
      position:sticky; top:0; z-index:50;
      background:rgba(6,22,36,0.82);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      transition:transform 0.4s cubic-bezier(.65,0,.35,1), box-shadow 0.3s ease;
    }
    nav.nav-hidden{transform:translateY(-100%);}
    nav.nav-shrink{box-shadow:0 10px 30px -18px rgba(0,0,0,0.6);}
    nav.nav-shrink .nav-inner{height:48px;}
    .nav-inner{transition:height 0.3s ease;}
    .nav-inner{
      position:relative;
      max-width:920px; margin:0 auto; padding:0 28px;
      height:60px; display:flex; align-items:center; justify-content:space-between;
    }
    .nav-brand{
      font-family:'IBM Plex Mono', monospace;
      font-size:14px; font-weight:600; color:var(--ink);
    }
    .nav-brand span{color:var(--teal-deep);}
    .nav-links{
      position:relative;
      display:flex; gap:26px; list-style:none; margin:0; padding:0;
    }
    .nav-links a{
      position:relative;
      font-family:'IBM Plex Mono', monospace;
      font-size:12.5px;
      text-decoration:none;
      color:var(--ink-soft);
      padding:4px 2px;
      transition:color 0.3s ease;
    }
    .nav-links a:hover{color:var(--teal-deep);}
    .nav-links a.active{color:var(--teal-deep);}
    .nav-indicator{
      position:absolute; bottom:-3px; left:0;
      height:2px; width:0;
      background:linear-gradient(90deg, var(--teal), var(--teal-deep));
      border-radius:2px;
      transition:transform 0.45s cubic-bezier(.65,0,.35,1), width 0.45s cubic-bezier(.65,0,.35,1), opacity 0.3s ease;
      opacity:0;
    }
    .nav-indicator.ready{opacity:1;}
    @media (max-width:640px){ .nav-links{display:none;} }

    /* ---------- hero ---------- */
    .hero{
      padding:72px 0 60px;
      position:relative;
      overflow:hidden;
    }
    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(70px);
      opacity:0.28;
      z-index:0;
      pointer-events:none;
    }
    .blob-a{
      width:420px; height:420px;
      background:var(--teal);
      top:-160px; right:-120px;
      animation:float-a 15s ease-in-out infinite;
    }
    .blob-b{
      width:320px; height:320px;
      background:var(--amber);
      bottom:-140px; left:-80px;
      animation:float-b 19s ease-in-out infinite;
    }
    .sunrays{
      position:absolute; inset:0;
      background:repeating-linear-gradient(100deg, rgba(191,239,245,0.05) 0px, rgba(191,239,245,0.05) 2px, transparent 2px, transparent 42px);
      mask-image:linear-gradient(180deg, rgba(0,0,0,0.5), transparent 70%);
      -webkit-mask-image:linear-gradient(180deg, rgba(0,0,0,0.5), transparent 70%);
      animation:ray-sway 10s ease-in-out infinite alternate;
      pointer-events:none;
    }
    @keyframes ray-sway{
      0%{transform:translateX(0) skewX(0deg);}
      100%{transform:translateX(-18px) skewX(-2deg);}
    }
    @keyframes float-a{
      0%, 100%{transform:translate(0,0) scale(1);}
      50%{transform:translate(-34px,42px) scale(1.12);}
    }
    @keyframes float-b{
      0%, 100%{transform:translate(0,0) scale(1);}
      50%{transform:translate(28px,-38px) scale(1.16);}
    }
    .hero > .wrap{position:relative; z-index:1;}
    .terminal{
      background:#04121D;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 20px 50px -20px rgba(2,10,18,0.6), 0 0 0 1px rgba(51,185,199,0.05);
      border:1px solid #123147;
      position:relative;
      animation:terminal-in 0.6s cubic-bezier(.21,.9,.32,1) both;
    }
    .terminal::after{
      content:"";
      position:absolute; left:0; right:0; bottom:0; height:40%;
      background:linear-gradient(180deg, transparent, rgba(51,185,199,0.05));
      pointer-events:none;
    }
    @keyframes terminal-in{
      from{opacity:0; transform:translateY(-14px) scale(0.98);}
      to{opacity:1; transform:translateY(0) scale(1);}
    }
    .terminal-bar{
      display:flex; align-items:center; gap:8px;
      padding:11px 16px;
      background:#071B2A;
      border-bottom:1px solid #123147;
    }
    .dot{width:9px; height:9px; border-radius:50%;}
    .dot.r{background:#E5636B;} .dot.y{background:#E7B34D;} .dot.g{background:#4FBF87;}
    .terminal-title{
      margin-left:8px;
      font-family:'IBM Plex Mono', monospace;
      font-size:11.5px;
      color:#5C87A0;
    }
    .terminal-body{
      padding:22px 20px 26px;
      font-family:'IBM Plex Mono', monospace;
      font-size:13.5px;
      color:#9FCBDB;
      min-height:150px;
      position:relative;
    }
    .terminal-body .prompt{color:#4FBF87;}
    .terminal-body .qline{color:var(--foam);}
    #typed-query{white-space:pre-wrap; word-break:break-word;}
    .cursor{
      display:inline-block; width:7px; height:15px;
      background:var(--foam); margin-left:2px; vertical-align:middle;
      animation:blink 1s step-end infinite;
    }
    @keyframes blink{50%{opacity:0;}}
    .result-table{
      margin-top:16px;
      opacity:0;
      transform:translateY(6px);
      transition:opacity 0.5s ease, transform 0.5s ease;
    }
    .result-table.show{opacity:1; transform:translateY(0);}
    .result-table .r-head, .result-table .r-row{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:14px;
    }
    .result-table .r-head{color:#5C87A0; padding-bottom:6px;}
    .result-table .r-row{
      color:var(--foam); padding:2px 0;
      opacity:0;
      animation:row-in 0.4s ease forwards;
    }
    .result-table.show .r-row:nth-child(3){animation-delay:0.05s;}
    .result-table.show .r-row:nth-child(4){animation-delay:0.15s;}
    .result-table.show .r-row:nth-child(5){animation-delay:0.25s;}
    @keyframes row-in{
      from{opacity:0; transform:translateX(-6px);}
      to{opacity:1; transform:translateX(0);}
    }
    .rule{border-bottom:1px dashed #1B3A50; margin:6px 0 8px;}

    .hero-lower{
      margin-top:52px;
      display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap;
    }
    .hero-name{
      font-size:clamp(36px,6vw,58px);
      font-weight:700; line-height:1.04;
      color:var(--ink);
      perspective:500px;
    }
    .hero-name .word{display:inline-block; white-space:nowrap;}
    .hero-name .word.accent{color:var(--teal-deep);}
    .hero-name .letter{
      display:inline-block;
      opacity:0;
      transform:translateY(28px) rotateX(-40deg);
      transform-origin:bottom;
      animation:letter-in 0.65s cubic-bezier(.21,.9,.32,1) forwards;
    }
    @keyframes letter-in{
      to{opacity:1; transform:translateY(0) rotateX(0);}
    }
    .hero-role{
      margin-top:10px;
      font-family:'IBM Plex Mono', monospace;
      font-size:15px;
      color:var(--teal-deep);
    }
    .hero-contact{
      display:flex; flex-direction:column; gap:6px;
      font-family:'IBM Plex Mono', monospace;
      font-size:12.5px;
      color:var(--ink-soft);
      text-align:right;
    }
    .hero-contact a{
      text-decoration:none;
      color:var(--ink-soft);
      border-bottom:1px solid transparent;
      transition:color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      display:inline-block;
    }
    .hero-contact a:hover{
      color:var(--teal);
      border-color:var(--teal);
      transform:translateX(-3px);
    }
    @media (max-width:640px){ .hero-contact a:hover{ transform:translateX(3px); } }
    @media (max-width:640px){ .hero-contact{text-align:left;} }

    .status-pill{
      display:inline-flex; align-items:center; gap:7px;
      font-family:'IBM Plex Mono', monospace;
      font-size:12px;
      color:var(--teal-deep);
      background:var(--teal-tint);
      border:1px solid rgba(51,185,199,0.35);
      padding:5px 11px;
      border-radius:20px;
      margin-top:18px;
    }
    .status-pill::before{
      content:""; width:6px; height:6px; border-radius:50%; background:var(--teal);
      box-shadow:0 0 0 3px var(--teal-tint);
      animation:pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot{
      0%, 100%{box-shadow:0 0 0 3px var(--teal-tint);}
      50%{box-shadow:0 0 0 6px var(--teal-tint);}
    }

    /* ---------- summary ---------- */
    .summary-text{
      font-size:17px;
      color:var(--ink-soft);
      max-width:760px;
    }
    .summary-text strong{color:var(--ink); font-weight:600;}

    /* ---------- skills ---------- */
    .schema-block{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:6px;
      padding:24px 26px;
      margin-bottom:18px;
      transition:border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }
    .schema-block:hover{
      border-color:rgba(51,185,199,0.4);
      box-shadow:0 10px 30px -20px rgba(51,185,199,0.5);
      transform:translateY(-3px);
    }
    .schema-head{
      font-family:'IBM Plex Mono', monospace;
      font-size:12.5px;
      color:var(--teal-deep);
      text-transform:lowercase;
      margin-bottom:16px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .field-row{
      display:grid;
      grid-template-columns:190px 1fr;
      gap:16px;
      padding:8px 0;
      font-size:14.5px;
      border-radius:4px;
      transition:background 0.2s ease, padding-left 0.2s ease;
    }
    .field-row:hover{background:var(--teal-tint); padding-left:8px;}
    .field-row + .field-row{border-top:1px dashed var(--line);}
    .field-name{
      font-family:'IBM Plex Mono', monospace;
      font-size:13px;
      color:var(--ink);
      font-weight:600;
    }
    .field-value{color:var(--ink-soft);}
    @media (max-width:640px){
      .field-row{grid-template-columns:1fr;}
    }
    .tag-row{
      display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;
      perspective:600px;
    }
    .tag{
      font-family:'IBM Plex Mono', monospace;
      font-size:12px;
      padding:5px 10px;
      border-radius:20px;
      background:var(--teal-tint);
      color:var(--foam);
      border:1px solid rgba(51,185,199,0.32);
      opacity:0;
      transform:rotateX(-85deg);
      transform-origin:bottom center;
      transition:background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .tag.flip-in{
      animation:tag-flip 0.55s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes tag-flip{
